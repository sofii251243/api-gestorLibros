# Spring Application
spring.application.name=booklog-api
server.port=8080

# Database Configuration - MySQL Production
# Railway/MySQL: usa variables MYSQL* directamente
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging - Production
logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/booklog-api.log
logging.file.max-size=10MB
logging.file.max-history=10

# Jackson Configuration
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_empty

# Server Configuration
server.servlet.context-path=/
server.error.include-message=never
server.error.include-binding-errors=never
server.compression.enabled=true
server.compression.min-response-size=1024

